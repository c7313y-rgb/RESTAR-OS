<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="theme-color" content="#0a48b6" />
<meta name="robots" content="noindex,follow" />
<title>404 — ifLink NEXT</title>
<meta name="description" content="お探しのページは見つかりませんでした。ifLink NEXT のホームへお戻りください。" />
<link rel="icon" type="image/svg+xml" href="./assets/images/favicon.svg" />
<link rel="apple-touch-icon" sizes="180x180" href="./assets/images/apple-touch-icon.png" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Hiragino Sans","Yu Gothic UI","Meiryo","Segoe UI",sans-serif;
  color:#08213c;display:grid;place-items:center;padding:24px;text-align:center;
  background:
    radial-gradient(1000px 500px at 18% -8%,rgba(255,255,255,.95),transparent 55%),
    radial-gradient(800px 480px at 88% 12%,rgba(74,176,255,.32),transparent 60%),
    radial-gradient(700px 520px at 50% 110%,rgba(13,125,240,.2),transparent 60%),
    linear-gradient(135deg,#f3f7fc 0%,#cfdce8 38%,#eef4f9 55%,#9dafc1 100%);
  overflow:hidden;
}
.wrap{max-width:560px}
.badge{
  width:96px;height:96px;border-radius:26px;margin:0 auto 22px;display:grid;place-items:center;
  background:linear-gradient(135deg,#13d6ff,#0a48b6 60%,#031b3a);
  color:#fff;font-weight:900;font-size:38px;letter-spacing:.04em;
  box-shadow:0 22px 56px rgba(0,72,182,.45),inset 0 1px 0 rgba(255,255,255,.4),0 0 38px rgba(0,212,255,.55);
  position:relative;
}
.badge:after{content:"";position:absolute;inset:6px;border-radius:20px;background:linear-gradient(135deg,rgba(255,255,255,.3),transparent 60%)}
h1{
  font-size:84px;letter-spacing:.04em;line-height:1;margin-bottom:8px;
  background:linear-gradient(180deg,#0a73e6 30%,#022859);
  -webkit-background-clip:text;background-clip:text;color:transparent;font-weight:900;
}
h2{font-size:22px;color:#08294f;margin-bottom:14px;letter-spacing:.04em}
p{font-size:14px;color:#465a6f;line-height:1.85;margin-bottom:26px}
.actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{
  padding:13px 22px;border-radius:14px;font-weight:900;font-size:14px;cursor:pointer;
  text-decoration:none;display:inline-flex;align-items:center;gap:6px;
  border:1px solid #cef6ff;
  background:linear-gradient(180deg,#22e0ff,#0a73e6 50%,#02265b);color:#fff;
  box-shadow:0 0 22px rgba(0,174,255,.55);transition:transform .18s ease,box-shadow .18s ease;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 0 38px rgba(0,212,255,.78)}
.btn.ghost{
  background:rgba(255,255,255,.86);color:#082345;border-color:rgba(255,255,255,.95);
  box-shadow:inset 0 1px 0 #fff,0 8px 18px rgba(0,42,88,.12);
}
.lang{margin-top:24px;font-size:12px;color:#7c92a6;font-weight:700;letter-spacing:.06em}
</style>
</head>
<body>
<main class="wrap">
  <div class="badge">if</div>
  <h1>404</h1>
  <h2>ページが見つかりませんでした</h2>
  <p>
    お探しの URL は移動・削除されたか、入力に誤りがある可能性があります。<br>
    The page you requested could not be found. / 您访问的页面不存在。
  </p>
  <div class="actions">
    <a class="btn" href="./">🏠 ホームへ戻る</a>
    <a class="btn ghost" href="./#builder">⚡ 共創ビルダー</a>
  </div>
  <div class="lang">JA · EN · 中文 — ifLink NEXT トリガー・アクション共創プラットフォーム</div>
</main>
</body>
</html>
